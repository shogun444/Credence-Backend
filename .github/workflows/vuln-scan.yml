name: Dependency Vulnerability Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run nightly at midnight UTC
    - cron: '0 0 * * *'

jobs:
  vuln-scan:
    name: CVE and SBOM Severity Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Security Gate Unit Tests
        run: npx vitest run src/security-gate.test.ts

      - name: Execute npm audit (Prod-only)
        run: |
          echo "[Audit] Running production dependency vulnerability scan..."
          npm audit --omit=dev --json > audit-report.json || true

      - name: Evaluate npm audit with Security Gate
        run: |
          echo "[Audit] Verifying npm audit results against SLA threshold..."
          npx tsx scripts/security-gate.ts --file audit-report.json --threshold high

      - name: Run Trivy FS Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-report.json'
          exit-code: '0' # Let our security gate handle the fail state
          vuln-type: 'library' # Focus on dependency libraries
          severity: 'HIGH,CRITICAL'

      - name: Evaluate Trivy scan with Security Gate
        run: |
          echo "[Trivy] Verifying Trivy SBOM scan results against SLA threshold..."
          npx tsx scripts/security-gate.ts --file trivy-report.json --threshold high --ignore-pkg activesupport
