          type: boolean
          example: false
      required:
        - success
        - data
        - page
        - limit
        - total
        - hasNext
    VoteResult:
      type: object
      properties:
        slashRequestId:
          type: string
          example: a1b2c3d4e5f6a7b8
        voterId:
          type: string
          example: validator-3
        choice:
          $ref: "#/components/schemas/VoteChoice"
        approveCount:
          type: integer
          example: 2
        rejectCount:
          type: integer
          example: 0
        status:
          $ref: "#/components/schemas/SlashRequestStatus"
      required:
        - slashRequestId
        - voterId
        - choice
        - approveCount
        - rejectCount
        - status
    SubmitVoteBody:
      type: object
      properties:
        voterId:
          type: string
          minLength: 1
          example: validator-3
        choice:
          $ref: "#/components/schemas/VoteChoice"
      required:
        - voterId
        - choice
    Dispute:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 5f8d0d55-1c1b-4e9a-9b1a-4e6f6f6f6f6f
        filedBy:
          type: string
          example: GDUKMGUGDZQK6YHYA5Z6AY2G4XDSZPSZ3SW5UN3ARVMO6QSRDWP5YLEX
        respondent:
          type: string
          example: GBVFLWXYZ6JJ7TUSU6QDJ6DOY4J5G5VHGJWSCMHL7QSAHRDEQU3EXFW2
        reason:
          type: string
          example: Goods delivered did not match the agreed specification
        evidence:
          type: array
          items:
            type: string
          example:
            - ipfs://bafybeih...
        status:
          $ref: "#/components/schemas/DisputeStatus"
        createdAt:
          type: string
          format: date-time
          example: 2024-01-15T09:00:00.000Z
        deadline:
          type: string
          format: date-time
          example: 2024-01-16T09:00:00.000Z
        resolution:
          type: string
          nullable: true
          example: null
      required:
        - id
        - filedBy
        - respondent
        - reason
        - evidence
        - status
        - createdAt
        - deadline
        - resolution
    DisputeStatus:
      type: string
      enum:
        - pending
        - under_review
        - resolved
        - dismissed
        - expired
    DisputeError:
      type: object
      properties:
        error:
          type: string
          example: NotFound
        message:
          type: string
          example: Dispute not found
      required:
        - error
        - message
    SubmitDisputeBody:
      type: object
      properties:
        filedBy:
          type: string
          pattern: ^G[A-Z2-7]{55}$
          description: Stellar address of the party filing the dispute
          example: GDUKMGUGDZQK6YHYA5Z6AY2G4XDSZPSZ3SW5UN3ARVMO6QSRDWP5YLEX
        respondent:
          type: string
          pattern: ^G[A-Z2-7]{55}$
          description: Stellar address of the respondent
          example: GBVFLWXYZ6JJ7TUSU6QDJ6DOY4J5G5VHGJWSCMHL7QSAHRDEQU3EXFW2
        reason:
          type: string
          minLength: 10
          description: Reason for the dispute (minimum 10 characters)
          example: Goods delivered did not match the agreed specification
        evidence:
          type: array
          items:
            type: string
          minItems: 1
          description: Evidence references (URIs, hashes, etc.) supporting the dispute
          example:
            - ipfs://bafybeih...
        deadlineMs:
          type: integer
          minimum: 3600000
          maximum: 2592000000
          description: Resolution deadline expressed as milliseconds from now (min 1 hour,
            max 30 days)
          example: 86400000
      required:
        - filedBy
        - respondent
        - reason
        - evidence
        - deadlineMs
    DisputeTransitionError:
      type: object
      properties:
        error:
          type: string
          example: Invalid dispute state transition
        code:
          type: string
          example: invalid_dispute_transition
        error_code:
          type: string
          example: invalid_dispute_transition
        message:
          type: string
          example: Invalid transition from "resolved" to "resolved"
      required:
        - error
        - code
        - error_code
        - message
    ResolveDisputeBody:
      type: object
      properties:
        resolution:
          type: string
          minLength: 1
          description: Resolution text describing the outcome
          example: Respondent agreed to a partial refund of 20%
      required:
        - resolution
    DismissDisputeBody:
      type: object
      properties:
        reason:
          type: string
          minLength: 1
          description: Reason the dispute is being dismissed
          example: Insufficient evidence provided
      required:
        - reason
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API key sent as `Authorization: Bearer <key>`"
  parameters: {}
paths:
  /api/health:
    get:
      summary: Health check
      description: Service health status.
      tags:
        - Health
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
                  version:
                    type: object
                    properties:
                      gitSha:
                        type: string
                      buildTimestamp:
                        type: string
                      nodeVersion:
                        type: string
                    required:
                      - gitSha
                      - buildTimestamp
                      - nodeVersion
                required:
                  - status
                  - service
                  - version
        "503":
          description: Unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
                  version:
                    type: object
                    properties:
                      gitSha:
                        type: string
                      buildTimestamp:
                        type: string
                      nodeVersion:
                        type: string
                    required:
                      - gitSha
                      - buildTimestamp
                      - nodeVersion
                required:
                  - status
                  - service
                  - version
  /.well-known/jwks.json:
    get:
      summary: JWKS
      description: JSON Web Key Set for verifying JWT signatures.
      tags:
        - Security
      responses:
        "200":
          description: JWKS returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  nullable: true
  /api/trust/{address}:
    get:
      summary: Get trust score
      description: Returns computed trust score and identity data.
      tags:
        - Trust
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: address
          in: path
      responses:
        "200":
          description: Trust data
          content:
            application/json:
              schema:
                nullable: true
        "400":
          description: Invalid address format
          content:
            application/json:
              schema:
                nullable: true
        "404":
          description: No identity record
          content:
            application/json:
              schema:
                nullable: true
  /api/trust:
    post:
      summary: Trust query (internal)
      description: Trust lookup entrypoint.
      tags:
        - Trust
      requestBody:
        required: true
        content:
          application/json:
            schema:
              nullable: true
      responses:
        "200":
          description: Trust data
          content:
            application/json:
              schema:
                nullable: true
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                nullable: true
  /api/attestations/{address}:
    get:
      summary: List attestations
      description: Returns attestations for a subject address.
      tags:
        - Attestations
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: address
          in: path
      responses:
        "200":
          description: Attestations
          content:
            application/json:
              schema:
                nullable: true
  /api/attestations:
    post:
      summary: Create attestation
      description: Creates an attestation and emits events.
      tags:
        - Attestations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bondId:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                attesterAddress:
                  type: string
                  minLength: 1
                subject:
                  type: string
                  minLength: 1
                value:
                  type: string
                  minLength: 1
                  maxLength: 2048
                key:
                  type: string
                  minLength: 1
                  maxLength: 128
                score:
                  type: integer
                  nullable: true
                  minimum: 0
                  maximum: 100
              required:
                - subject
                - value
              additionalProperties: false
      responses:
        "201":
          description: Attestation created
          content:
            application/json:
              schema:
                nullable: true
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                nullable: true
        "409":
          description: Duplicate attestation
          content:
            application/json:
              schema:
                nullable: true
  /api/bulk:
    post:
      summary: Bulk operations
      description: Performs bulk operations.
      tags:
        - Bulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              nullable: true
      responses:
        "200":
          description: Bulk result
          content:
            application/json:
              schema:
                nullable: true
  /api/imports:
    post:
      summary: Imports
      description: Imports data.
      tags:
        - Imports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              nullable: true
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                nullable: true
  /api/orgs/{orgId}/policies:
    get:
      summary: List policies
      description: Lists policies for an organization.
      tags:
        - Policy
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: orgId
          in: path
      responses:
        "200":
          description: Policies
          content:
            application/json:
              schema:
                nullable: true
  /api/analytics:
    get:
      summary: Analytics
      description: Returns analytics summary.
      tags:
        - Analytics
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                nullable: true
  /api/payouts:
    post:
      summary: Create payout
      description: Creates a payout job.
      tags:
        - Payouts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bondId:
                  anyOf:
                    - type: string
                    - type: number
                amount:
                  type: string
                  pattern: ^\d+(\.\d{1,18})?$
                transactionHash:
                  type: string
                  minLength: 1
                  maxLength: 128
                settledAt:
                  type: string
                  format: date-time
                status:
                  type: string
                  enum:
                    - pending
                    - settled
                    - failed
              required:
                - bondId
                - amount
                - transactionHash
      responses:
        "201":
          description: Payout created
          content:
            application/json:
              schema:
                nullable: true
  /api/wallets:
    post:
      summary: Create a wallet
      description: Creates a new wallet with an optional initial balance.
      tags:
        - Wallets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWalletBody"
      responses:
        "201":
          description: Wallet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "409":
          description: A wallet with this address already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletError"
  /api/wallets/{id}/debit:
    post:
      summary: Debit a wallet
      description: Atomically debits the specified amount from a wallet balance. Fails
        if the balance would go negative.
      tags:
        - Wallets
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletDebitBody"
      responses:
        "200":
          description: Debit successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletDebitResponse"
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletError"
        "422":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletError"
  /api/bond/{address}:
    get:
      summary: Get bond status
      description: Returns the current bond status and lifecycle state for a wallet address.
      tags:
        - Bond
      parameters:
        - schema:
            type: string
            minLength: 1
            description: Ethereum (0x…) or Stellar (G…) wallet address
            example: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e"
          required: true
          description: Ethereum (0x…) or Stellar (G…) wallet address
          name: address
          in: path
      responses:
        "200":
          description: Bond record found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BondResponse"
        "400":
          description: Invalid address format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BondError"
        "404":
          description: No bond record for this address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BondError"
  /api/bond:
    post:
      summary: Create or top-up a bond
      description: Creates a new bond or tops up an existing one for the given wallet
        address.
      tags:
        - Bond
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBondBody"
      responses:
        "201":
          description: Bond created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BondResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BondError"
  /api/governance/slash-requests:
    post:
      summary: Create a slash request
      description: Opens a new slash request awaiting governance votes.
      tags:
        - Governance
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSlashRequestBody"
      responses:
        "201":
          description: Slash request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlashRequest"
        "400":
          description: Validation error (e.g. threshold < 1, or totalSigners < threshold)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceError"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceError"
    get:
      summary: List slash requests
      description: Returns a paginated list of slash requests, optionally filtered by
        status.
      tags:
        - Governance
      security:
        - bearerAuth: []
      parameters:
        - schema:
            $ref: "#/components/schemas/SlashRequestStatus"
          required: false
          name: status
          in: query
        - schema:
            type: integer
            minimum: 1
            example: 1
          required: false
          name: page
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 20
          required: false
          name: limit
          in: query
        - schema:
            type: integer
            nullable: true
            minimum: 0
          required: false
          name: offset
          in: query
      responses:
        "200":
          description: Paginated list of slash requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlashRequestsListResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceError"
  /api/governance/slash-requests/{id}:
    get:
      summary: Get a slash request
      description: Returns a single slash request by ID.
      tags:
        - Governance
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            description: Slash request ID
            example: a1b2c3d4e5f6a7b8
          required: true
          description: Slash request ID
          name: id
          in: path
      responses:
        "200":
          description: Slash request found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlashRequest"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceError"
        "404":
          description: No slash request with this ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceError"
  /api/governance/slash-requests/{id}/votes:
    post:
      summary: Vote on a slash request
      description: Casts an approve/reject vote on a pending slash request.
      tags:
        - Governance
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            description: Slash request ID
            example: a1b2c3d4e5f6a7b8
          required: true
          description: Slash request ID
          name: id
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitVoteBody"
      responses:
        "201":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceError"
        "404":
          description: No slash request with this ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceError"
        "409":
          description: Request already resolved, or voter has already voted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceError"
  /api/disputes:
    post:
      summary: Submit a dispute
      description: Files a new dispute between two Stellar addresses with supporting
        evidence.
      tags:
        - Disputes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitDisputeBody"
      responses:
        "201":
          description: Dispute submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
        "400":
          description: Validation error (invalid Stellar address, reason too short,
            missing evidence, or deadline out of range)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeError"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeError"
  /api/disputes/{id}:
    get:
      summary: Get a dispute
      description: Returns a single dispute by ID.
      tags:
        - Disputes
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
            description: Dispute ID
            example: 5f8d0d55-1c1b-4e9a-9b1a-4e6f6f6f6f6f
          required: true
          description: Dispute ID
          name: id
          in: path
      responses:
        "200":
          description: Dispute found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeError"
        "404":
          description: No dispute with this ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeError"
  /api/disputes/{id}/review:
    post:
      summary: Mark a dispute under review
      description: Transitions a pending dispute to `under_review`.
      tags:
        - Disputes
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
            description: Dispute ID
            example: 5f8d0d55-1c1b-4e9a-9b1a-4e6f6f6f6f6f
          required: true
          description: Dispute ID
          name: id
          in: path
      responses:
        "200":
          description: Dispute marked under review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeError"
        "422":
          description: Invalid state transition (e.g. dispute is not pending)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeTransitionError"
  /api/disputes/{id}/resolve:
    post:
      summary: Resolve a dispute
      description: Transitions a pending or under-review dispute to `resolved` with a
        resolution note.
      tags:
        - Disputes
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
            description: Dispute ID
            example: 5f8d0d55-1c1b-4e9a-9b1a-4e6f6f6f6f6f
          required: true
          description: Dispute ID
          name: id
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveDisputeBody"
      responses:
        "200":
          description: Dispute resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeError"
        "422":
          description: Invalid state transition, missing resolution text, or dispute has
            expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeTransitionError"
  /api/disputes/{id}/dismiss:
    post:
      summary: Dismiss a dispute
      description: Transitions a pending or under-review dispute to `dismissed` with a
        reason.
      tags:
        - Disputes
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
            description: Dispute ID
            example: 5f8d0d55-1c1b-4e9a-9b1a-4e6f6f6f6f6f
          required: true
          description: Dispute ID
          name: id
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DismissDisputeBody"
      responses:
        "200":
          description: Dispute dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeError"
        "422":
          description: Invalid state transition or missing dismiss reason
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeTransitionError"
